  <script>

      "habit-loop-pro": { name: "Habit Loop Pro", icon: "../adobix_assets/img/projects/habit-loop-pro.png", description: "Advanced habit tracker with streaks and reminders.", longDescription: "Habit Loop Pro is built for people who want a serious, distraction‑free habit tracker. Create routines, track streaks and review your consistency in a calm, focused interface.", features: ["Unlimited habits with custom schedules", "Beautiful streak and stats views", "Subtle but powerful reminders"], bestFor: ["People building several habits at once", "Users who like seeing detailed progress", "Anyone who wants a clean, ad‑free habit tracker"], why: "You see exactly how consistent you've been without noisy charts or clutter.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.habit.tracker&hl=en_IN" },
      "habit-loop": { name: "Habit Loop", icon: "../adobix_assets/img/projects/habit-loop.png", description: "Lightweight habit tracker for simple daily routines.", longDescription: "Habit Loop focuses only on the essentials: name your habit, check it off, and watch your streak grow.", features: ["Fast one‑tap check‑ins", "Clean streak view", "Designed for one‑handed use"], bestFor: ["Users who want 1–3 important habits to stick", "People who get overwhelmed by big planners"], why: "Because it's so simple, you're more likely to keep using it every day.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.habitloop.app&hl=en_IN" },
      "focus-mode": { name: "Focus Mode", icon: "../adobix_assets/img/projects/focus-mode.png", description: "Structured focus timer with breaks to avoid burnout.", longDescription: "Focus Mode turns big tasks into small, timed sessions with scheduled breaks.", features: ["Customizable focus and break durations", "Session history", "Simple interface"], bestFor: ["Students using Pomodoro", "Remote workers needing deep‑work blocks"], why: "By breaking work into focused intervals, it feels easier to start and keep going.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.focusinternetblocker&hl=en_IN" },
      "phone-pro": { name: "Phone Pro", icon: "../adobix_assets/img/projects/phone-pro.png", description: "Keep your Android device clean, fast, and responsive.", longDescription: "Phone Pro gives you a quick overview of your device health and safe tools to clear space and close background tasks.", features: ["Storage and performance overview", "Simple cleanup", "Safe, beginner‑friendly tools"], bestFor: ["Users with older or slower phones", "People who don't want complicated system tools"], why: "It focuses on the basics that actually make a difference.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.phonepro&hl=en_IN" },
      "eye-shield": { name: "Eye Shield", icon: "../adobix_assets/img/projects/eye-sheild.png", description: "Warm screen filter to reduce eye strain at night.", longDescription: "Eye Shield adds a soft, warm overlay to your screen so it's easier on your eyes in dark rooms.", features: ["Warm color filters", "Quick on/off toggle", "Multiple intensity levels"], bestFor: ["Night readers", "People sensitive to bright or blue‑tinted screens"], why: "Your screen still looks clear, but feels much softer in low light.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tool.eyeshieldpro&hl=en_IN" },

      expense: { name: "Expense", icon: "../adobix_assets/img/projects/expense.png", description: "Simple daily expense tracker for quick logging.", longDescription: "Expense keeps daily tracking easy: enter an amount, choose a category, and you're done.", features: ["Fast add screen", "Basic breakdowns by day and category", "Clean layout"], bestFor: ["People new to tracking money", "Light, everyday tracker users"], why: "Logging each purchase is so quick, you're more likely to keep doing it.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.expense_tracker&hl=en_IN" },
      "encrypted-qr": { name: "Encrypted QR", icon: "../adobix_assets/img/projects/EncryptedQR.png", description: "Create and scan encrypted QR codes for private data.", longDescription: "Encrypted QR lets you lock text, passwords, or Wi‑Fi details inside a QR code that only unlocks with your passphrase.", features: ["Encrypt any text into a QR code", "Decrypt only with your passphrase", "Works offline"], bestFor: ["Sharing Wi‑Fi securely", "Storing private notes in QR form"], why: "Simple encryption without complex security tools.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.encryptedqr.pro&hl=en_IN" },
      qr: { name: "QR", icon: "../adobix_assets/img/projects/qr.png", description: "Fast, reliable QR & barcode scanner without clutter.", longDescription: "QR focuses on speed and clarity. Open the app and it's instantly ready to scan.", features: ["Instant scanning", "History of recent scans", "Popular code formats"], bestFor: ["People who scan codes daily", "Users who want a scanner without heavy ads"], why: "It does one job extremely well.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.quickqr.pro&hl=en_IN" },
      "battery-vitals": { name: "Battery Vitals", icon: "../assets/icons/BatteryVitals.png", description: "Battery usage and health monitor with a privacy-first approach.", longDescription: "Battery Vitals helps you understand battery health and usage patterns clearly, including temperature, voltage, and app-level battery impact.", features: ["Battery health dashboard", "Foreground and background app usage insights", "Temperature and voltage tracking"], bestFor: ["Users troubleshooting battery drain", "People who want a minimal battery monitor", "Privacy-conscious Android users"], why: "It gives practical battery insights without clutter or invasive data collection.", playStoreUrl: "https://play.google.com/store/apps/details?id=com.tools.battery.vitals" },

    };
    function loadApp() {
      const params = new URLSearchParams(window.location.search);
      const key = params.get("app") || "limitly";
      const app = apps[key];
      if (!app) {
        document.getElementById("appTitle").textContent = "App not found";
        document.getElementById("appDescription").textContent = "The app you requested is unavailable or the link is incorrect.";
        document.getElementById("appLongDescription").textContent = "Please return to the apps section and choose a valid app.";
        document.getElementById("appFeatures").innerHTML = "<li>Open the apps page and select an app again.</li>";
        document.getElementById("appBestFor").innerHTML = "<li>All visitors looking for official app information.</li>";
        document.getElementById("appWhy").textContent = "This helps avoid opening broken or outdated links.";
        document.getElementById("playStoreLink").style.display = "none";
        document.getElementById("privacyLink").href = "../../privacy-policy.html";
        return;
      }
      document.title = app.name + " | AdobixTech";
      document.getElementById("appTitle").textContent = app.name;
      document.getElementById("appIcon").src = app.icon;
      document.getElementById("appIcon").alt = app.name + " icon";
      document.getElementById("appDescription").textContent = app.description;
      document.getElementById("appLongDescription").textContent = app.longDescription;
      document.getElementById("appWhy").textContent = app.why;
      const fl = document.getElementById("appFeatures"); fl.innerHTML = ""; app.features.forEach(f => { const li = document.createElement("li"); li.textContent = f; fl.appendChild(li); });
      const bf = document.getElementById("appBestFor"); bf.innerHTML = ""; app.bestFor.forEach(b => { const li = document.createElement("li"); li.textContent = b; bf.appendChild(li); });
      const pl = document.getElementById("privacyLink"); 
      if (pl) { 
        // Use app-specific privacy policy pages when available
        const map = { 
          "limitly": "limitly-privacy.html", 
          "habit-loop-pro": "habit-loop-pro-privacy.html", 
          "habit-loop": "habit-loop-privacy.html", 
          "focus-mode": "focus-mode-privacy.html", 
          "phone-pro": "phone-pro-privacy.html", 
          "eye-shield": "eye-shield-privacy.html", 
          "expense-pro": "expense-pro-privacy.html", 
          "expense": "expense-privacy.html", 
          "encrypted-qr": "encrypted-qr-privacy.html", 
          "qr": "qr-privacy.html",
          "battery-vitals": "battery-vitals-privacy.html",
          "expense-loop": "expense-loop-privacy.html",
          "internet-blocker": "internet-blocker-privacy.html" 
        }; 
        pl.href = map[key] || "../../privacy-policy.html"; 
      }
      const playLink = document.getElementById("playStoreLink"); if (playLink && app.playStoreUrl) { playLink.href = app.playStoreUrl; playLink.style.display = "inline-block"; } else if (playLink) { playLink.style.display = "none"; }

      const metaDescription = `${app.name}: ${app.description}`;
      document.title = `${app.name} | AdobixTech`;
      const setMeta = (selector, value) => {
        const el = document.querySelector(selector);
        if (el) el.setAttribute("content", value);
      };
      setMeta('meta[name="description"]', metaDescription);
      setMeta('meta[property="og:title"]', `${app.name} | AdobixTech`);
      setMeta('meta[property="og:description"]', metaDescription);
      setMeta('meta[property="og:image"]', app.icon);
      setMeta('meta[name="twitter:title"]', `${app.name} | AdobixTech`);
      setMeta('meta[name="twitter:description"]', metaDescription);

      const schemaEl = document.getElementById("appSchema");
      if (schemaEl) {
        const schema = {
          "@context": "https://schema.org",
          "@type": "SoftwareApplication",
          "name": app.name,
          "applicationCategory": app.name.toLowerCase().includes("expense") ? "FinanceApplication" : app.name.toLowerCase().includes("habit") || app.name.toLowerCase().includes("focus") || app.name.toLowerCase().includes("blocker") ? "ProductivityApplication" : app.name.toLowerCase().includes("eye") ? "HealthApplication" : "UtilitiesApplication",
          "operatingSystem": "Android",
          "description": app.description,
          "image": app.icon,
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "publisher": {
            "@type": "Organization",
            "name": "AdobixTech"
          }
        };
        if (app.playStoreUrl) schema.installUrl = app.playStoreUrl;
        schemaEl.textContent = JSON.stringify(schema);
      }
    }
    function initMobileStickyCta() {
      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      const body = document.body;
      if (!isMobile) {
        body.classList.remove("show-mobile-cta");
        return;
      }
      const toggle = () => {
        if (window.scrollY > 220) {
          body.classList.add("show-mobile-cta");
        } else {
          body.classList.remove("show-mobile-cta");
        }
      };
      toggle();
      window.addEventListener("scroll", toggle, { passive: true });
    }
    loadApp();
    initMobileStickyCta();
  </script>
